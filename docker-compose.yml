version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: arlonecs
      POSTGRES_PASSWORD: arlonecs_secret
      POSTGRES_DB: arlonecs_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://arlonecs:arlonecs_secret@postgres:5432/arlonecs_db
      JWT_SECRET: change_this_in_production
      CLIENT_URL: http://localhost:5173
      PORT: 5000
    ports:
      - '5000:5000'
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:
