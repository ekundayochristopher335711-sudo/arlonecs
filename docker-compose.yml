version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aurum
      POSTGRES_PASSWORD: aurum_secret
      POSTGRES_DB: aurum_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://aurum:aurum_secret@postgres:5432/aurum_db
      DIRECT_URL: postgresql://aurum:aurum_secret@postgres:5432/aurum_db
      JWT_SECRET: change_this_in_production
      CLIENT_URL: http://localhost:5173
      PORT: 5000
    ports:
      - '5000:5000'
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:
